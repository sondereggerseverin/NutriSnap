name: Build APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build Debug APK
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
          NUTRITIONIX_APP_ID: ${{ secrets.NUTRITIONIX_APP_ID }}
          NUTRITIONIX_API_KEY: ${{ secrets.NUTRITIONIX_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build_output.log; exit ${PIPESTATUS[0]}
      - name: Sign APK with stable keystore
        if: success()
        run: |
          UNSIGNED=app/build/outputs/apk/debug/app-debug.apk
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)/apksigner sign \
            --ks app/nutrisnap-debug.keystore \
            --ks-pass pass:nutrisnap123 \
            --key-pass pass:nutrisnap123 \
            --ks-key-alias nutrisnap-debug \
            $UNSIGNED
          echo "APK signed with stable keystore"
      - name: Upload errors to repo
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_NUM: ${{ github.run_number }}
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json, base64, os

          token = os.environ['GH_TOKEN']
          repo = os.environ['REPO']
          run_num = os.environ['RUN_NUM']

          with open('build_output.log', 'r', errors='replace') as f:
              lines = f.readlines()

          error_lines = [l for l in lines if any(k in l for k in [
              'e: ', 'error:', 'Unresolved reference', 'Cannot find',
              'cannot find', 'FAILED', 'unresolved', 'not found',
              'None of the following', 'Overload resolution', 'Type mismatch',
              'Val cannot be reassigned', 'Expecting', 'Compilation error',
              'is not defined', 'is not a member'
          ])]

          content = (
              f"# Build errors - run {run_num}\n\n"
              "## Error lines\n```\n" +
              "".join(error_lines[-80:]) +
              "```\n\n## Last 150 lines\n```\n" +
              "".join(lines[-150:]) +
              "```\n"
          )

          encoded = base64.b64encode(content.encode()).decode()

          api_url = f"https://api.github.com/repos/{repo}/contents/build_errors.txt"
          req = urllib.request.Request(api_url, headers={"Authorization": f"token {token}"})
          try:
              existing = json.load(urllib.request.urlopen(req))
              file_sha = existing['sha']
          except:
              file_sha = None

          payload = {"message": f"ci: errors run {run_num}", "content": encoded}
          if file_sha:
              payload["sha"] = file_sha

          put_req = urllib.request.Request(
              api_url,
              data=json.dumps(payload).encode(),
              headers={"Authorization": f"token {token}", "Content-Type": "application/json"},
              method="PUT"
          )
          resp = json.load(urllib.request.urlopen(put_req))
          print("Committed:", resp.get('commit', {}).get('sha', 'unknown')[:12])
          PYEOF
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.log
          retention-days: 14
      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NutriSnap-debug
          path: app/build/outputs/apk/debug/
          if-no-files-found: error
          retention-days: 14
