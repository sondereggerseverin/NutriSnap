name: Build APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build Debug APK
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build_output.log; exit ${PIPESTATUS[0]}
      - name: Commit build errors to repo
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          grep -E "e: |error:|FAILED|Unresolved reference|Cannot find|cannot find|not found|duplicate" build_output.log | tail -100 > build_errors.txt 2>/dev/null || true
          echo "" >> build_errors.txt
          echo "=== LAST 150 LINES ===" >> build_errors.txt
          tail -150 build_output.log >> build_errors.txt
          git pull --rebase origin main
          git add build_errors.txt
          git diff --staged --quiet || git commit -m "ci: build errors from run ${{ github.run_number }}"
          git push origin main
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.log
          retention-days: 14
      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NutriSnap-debug
          path: app/build/outputs/apk/debug/
          if-no-files-found: error
          retention-days: 14
