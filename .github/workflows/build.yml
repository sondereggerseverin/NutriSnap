name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        id: build
        run: |
          ./gradlew assembleDebug 2>&1 | tee /tmp/build.log
          exit ${PIPESTATUS[0]}

      - name: Show build errors on failure
        if: failure()
        run: |
          echo "=== LAST 200 LINES OF BUILD LOG ==="
          tail -200 /tmp/build.log

      - name: Find APK
        run: find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NutriSnap-debug
          path: app/build/outputs/apk/debug/
          if-no-files-found: warn
          retention-days: 14
