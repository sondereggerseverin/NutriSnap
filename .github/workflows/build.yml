name: Build APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build Debug APK
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build_output.log; exit ${PIPESTATUS[0]}
      - name: Show build errors
        if: failure()
        run: |
          echo "=== LAST 200 LINES OF BUILD OUTPUT ==="
          tail -200 build_output.log
          echo "=== ERROR LINES ==="
          grep -i "error\|unresolved\|cannot\|not found\|FAILED" build_output.log | grep -v "^[0-9]" | tail -50
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.log
          retention-days: 14
      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NutriSnap-debug
          path: app/build/outputs/apk/debug/
          if-no-files-found: error
          retention-days: 14
