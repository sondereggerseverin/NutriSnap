name: Build APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build Debug APK
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build_output.log; exit ${PIPESTATUS[0]}
      - name: Post errors as Gist
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ERRORS=$(grep -E "error:|FAILED|unresolved reference|cannot find" build_output.log | tail -80 || true)
          LAST=$(tail -100 build_output.log)
          BODY=$(printf "## Build Errors\n\n### Error lines\n\`\`\`\n%s\n\`\`\`\n\n### Last 100 lines\n\`\`\`\n%s\n\`\`\`" "$ERRORS" "$LAST")
          PAYLOAD=$(jq -n --arg desc "NutriSnap build errors" --arg content "$BODY" \
            '{"description":$desc,"public":true,"files":{"build_errors.md":{"content":$content}}}')
          GIST_URL=$(curl -s -X POST https://api.github.com/gists \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" | jq -r '.html_url')
          echo "## Build Errors" >> $GITHUB_STEP_SUMMARY
          echo "Gist: $GIST_URL" >> $GITHUB_STEP_SUMMARY
          echo "::error::Build failed - errors at $GIST_URL"
          echo "$ERRORS"
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.log
          retention-days: 14
      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NutriSnap-debug
          path: app/build/outputs/apk/debug/
          if-no-files-found: error
          retention-days: 14
