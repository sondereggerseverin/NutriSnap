name: Build APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build Debug APK
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build_output.log; exit ${PIPESTATUS[0]}
      - name: Push errors via API
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ERROR_LINES=$(grep -E "e: |error:|FAILED|Unresolved reference|Cannot find|cannot find|not found" build_output.log | tail -80 || echo "no grep matches")
          LAST_LINES=$(tail -150 build_output.log)
          FULL="${ERROR_LINES}
=== LAST 150 LINES ===
${LAST_LINES}"
          B64=$(echo "$FULL" | base64 -w 0)
          # Try to get existing file SHA
          EXISTING=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/build_errors.txt")
          FILE_SHA=$(echo "$EXISTING" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")
          if [ -n "$FILE_SHA" ]; then
            PAYLOAD=$(python3 -c "import json; print(json.dumps({'message':'ci: build errors run ${{ github.run_number }}','content':'$B64','sha':'$FILE_SHA'}))")
          else
            PAYLOAD=$(python3 -c "import json; print(json.dumps({'message':'ci: build errors run ${{ github.run_number }}','content':'$B64'}))")
          fi
          curl -s -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.github.com/repos/${{ github.repository }}/contents/build_errors.txt" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print('Pushed:', d.get('commit',{}).get('sha','FAILED:'+str(d.get('message','')))[:60])"
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.log
          retention-days: 14
      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NutriSnap-debug
          path: app/build/outputs/apk/debug/
          if-no-files-found: error
          retention-days: 14
